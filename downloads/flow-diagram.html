<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>ToolProof Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; font-family: -apple-system, system-ui, sans-serif; }
.container { width: 1000px; }
.title { color: #e5e5e5; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 48px; letter-spacing: -0.02em; }
.subtitle { color: #666; font-size: 14px; text-align: center; margin-top: -40px; margin-bottom: 48px; }
.flow { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 48px; }
.box { padding: 20px 28px; border-radius: 8px; text-align: center; min-width: 160px; }
.box-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.box-name { font-size: 18px; font-weight: 600; }
.agent { background: #1a1a1a; border: 1px solid #333; }
.agent .box-label { color: #666; }
.agent .box-name { color: #e5e5e5; }
.proxy { background: #0f2918; border: 1px solid #22c55e40; }
.proxy .box-label { color: #22c55e80; }
.proxy .box-name { color: #22c55e; }
.tool { background: #1a1a1a; border: 1px solid #333; }
.tool .box-label { color: #666; }
.tool .box-name { color: #e5e5e5; }
.arrow { color: #333; font-size: 28px; padding: 0 12px; }
.receipt-flow { display: flex; justify-content: center; margin-top: 24px; }
.receipt-arrow { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.receipt-arrow .line { width: 2px; height: 40px; background: #22c55e40; }
.receipt-box { background: #141414; border: 1px solid #262626; border-radius: 8px; padding: 20px 32px; text-align: center; }
.receipt-box .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
.receipt-box .hash { color: #22c55e; font-family: monospace; font-size: 13px; margin-top: 8px; }
.verdicts { display: flex; justify-content: center; gap: 40px; margin-top: 48px; }
.verdict { text-align: center; padding: 16px 24px; border-radius: 8px; background: #141414; border: 1px solid #262626; min-width: 180px; }
.verdict-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.verdict-desc { font-size: 12px; color: #666; }
.v-green .verdict-name { color: #22c55e; }
.v-yellow .verdict-name { color: #eab308; }
.v-red .verdict-name { color: #ef4444; }
</style>
</head>
<body>
<div class="container">
  <div class="title">How ToolProof Works</div>
  <div class="subtitle">Every tool call gets a cryptographic receipt</div>

  <div class="flow">
    <div class="box agent">
      <div class="box-label">Your</div>
      <div class="box-name">AI Agent</div>
    </div>
    <div class="arrow">--></div>
    <div class="box proxy">
      <div class="box-label">ToolProof</div>
      <div class="box-name">Proxy</div>
    </div>
    <div class="arrow">--></div>
    <div class="box tool">
      <div class="box-label">Actual</div>
      <div class="box-name">Tool / API</div>
    </div>
  </div>

  <div class="receipt-flow">
    <div class="receipt-arrow">
      <div class="line"></div>
      <div class="receipt-box">
        <div class="label">Signed Receipt</div>
        <div class="hash">sha256: a1b2c3d4e5f6...</div>
        <div style="color:#555;font-size:11px;margin-top:6px">tool + args + response + timestamp</div>
      </div>
    </div>
  </div>

  <div class="verdicts">
    <div class="verdict v-green">
      <div class="verdict-name">VERIFIED</div>
      <div class="verdict-desc">Claim matches receipt</div>
    </div>
    <div class="verdict v-yellow">
      <div class="verdict-name">UNVERIFIED</div>
      <div class="verdict-desc">No receipt found</div>
    </div>
    <div class="verdict v-red">
      <div class="verdict-name">TAMPERED</div>
      <div class="verdict-desc">Receipt doesn't match</div>
    </div>
  </div>
</div>
</body>
</html>
